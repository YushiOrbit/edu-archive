<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>강의자료실</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Malgun Gothic', sans-serif;
      background: #0a1628;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 로그인 화면 */
    #login-section {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      flex: 1; padding: 20px;
    }
    .login-box {
      background: #112240;
      border: 1px solid #1e3a5f;
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .login-box h2 {
      font-size: 22px; color: #e2e8f0;
      margin-bottom: 8px; font-weight: 700;
    }
    .login-box p {
      font-size: 13px; color: #64748b;
      margin-bottom: 28px;
    }
    .login-box input {
      width: 100%; padding: 13px 16px;
      background: #0a1628;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      color: #e2e8f0; font-size: 14px;
      margin-bottom: 12px; outline: none;
    }
    .login-box input:focus { border-color: #3b82f6; }
    .login-box button {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: white; border: none;
      border-radius: 8px; font-size: 14px;
      font-weight: 600; cursor: pointer;
      transition: opacity 0.2s;
    }
    .login-box button:hover { opacity: 0.9; }
    #error {
      color: #f87171; font-size: 12px;
      margin-top: 10px; display: none;
    }

    /* 메인 화면 */
    #main-section {
      display: none; flex: 1;
      max-width: 860px; width: 100%;
      margin: 0 auto; padding: 40px 20px 20px;
    }
    .page-header {
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid #1e3a5f;
    }
    .page-header h1 {
      font-size: 24px; color: #e2e8f0;
      font-weight: 700; margin-bottom: 4px;
    }
    .page-header p {
      font-size: 13px; color: #64748b;
    }

    /* 업로드 박스 */
    .upload-box {
      background: #112240;
      border: 2px dashed #1e3a5f;
      border-radius: 12px;
      padding: 32px; text-align: center;
      margin-bottom: 32px;
      transition: border-color 0.2s;
    }
    .upload-box:hover { border-color: #3b82f6; }
    .upload-box input[type="file"] { display: none; }
    .upload-box label {
      display: inline-block;
      padding: 10px 22px;
      background: #1e3a5f;
      color: #93c5fd;
      border-radius: 8px; cursor: pointer;
      font-size: 13px; font-weight: 600;
      margin-bottom: 14px;
      transition: background 0.2s;
    }
    .upload-box label:hover { background: #1d4ed8; color: white; }
    #selected-file {
      font-size: 12px; color: #64748b; margin-bottom: 12px;
    }
    .upload-btn {
      display: inline-block; padding: 10px 28px;
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: white; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .upload-btn:hover { opacity: 0.9; }
    #upload-status { margin-top: 12px; font-size: 13px; }

    /* 파일 목록 */
    .section-title {
      font-size: 13px; font-weight: 700;
      color: #64748b; letter-spacing: 1.5px;
      text-transform: uppercase; margin-bottom: 14px;
    }
    .file-item {
      background: #112240;
      border: 1px solid #1e3a5f;
      border-radius: 10px;
      padding: 16px 20px; margin-bottom: 10px;
      display: flex; justify-content: space-between;
      align-items: center;
      transition: border-color 0.2s;
    }
    .file-item:hover { border-color: #3b82f6; }
    .file-info { display: flex; align-items: center; gap: 12px; }
    .file-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex; align-items: center;
      justify-content: center; font-size: 16px;
      background: #1e3a5f; flex-shrink: 0;
    }
    .file-name {
      font-size: 14px; color: #e2e8f0; font-weight: 500;
    }
    .download-btn {
      background: #1e3a5f; color: #93c5fd;
      padding: 7px 16px; border-radius: 6px;
      text-decoration: none; font-size: 12px;
      font-weight: 600; white-space: nowrap;
      transition: background 0.2s;
    }
    .download-btn:hover { background: #1d4ed8; color: white; }
    #loading { text-align: center; color: #64748b; padding: 40px; }
    .empty-state {
      text-align: center; color: #64748b;
      padding: 40px; font-size: 14px;
    }

    /* 푸터 */
    footer {
      text-align: center;
      padding: 24px 20px;
      border-top: 1px solid #1e3a5f;
      margin-top: 40px;
    }
    footer p {
      font-size: 12px; color: #334155;
      line-height: 1.8;
    }
    footer span { color: #3b82f6; }
  </style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-section">
  <div class="login-box">
    <h2>🔐 강의자료실</h2>
    <p>비밀번호를 입력하세요</p>
    <input type="password" id="pw" placeholder="Password" />
    <button onclick="checkPassword()">Enter</button>
    <p id="error">비밀번호가 틀렸습니다</p>
  </div>
</div>

<!-- 메인 화면 -->
<div id="main-section">
  <div class="page-header">
    <h1>📚 강의자료실</h1>
    <p>PDF 및 PPTX 자료를 업로드하고 관리하세요</p>
  </div>

  <!-- 업로드 박스 -->
  <div class="upload-box">
    <input type="file" id="file-input" accept=".pdf,.pptx,.ppt" onchange="showFileName()" />
    <label for="file-input">📁 파일 선택 (PDF / PPTX)</label>
    <p id="selected-file">선택된 파일 없음</p>
    <button class="upload-btn" onclick="uploadFile()">⬆️ 업로드</button>
    <p id="upload-status"></p>
  </div>

  <!-- 파일 목록 -->
  <div class="section-title">업로드된 자료</div>
  <div id="file-list">
    <p id="loading">파일 목록 불러오는 중...</p>
  </div>
</div>

<!-- 푸터 -->
<footer>
  <p>Created by <span>Seoyi · YushiOrbit</span></p>
  <p>for <span>Hanjasan Holdings</span></p>
</footer>

<script>
  // ⚙️ 본인 정보 입력
  const PASSWORD = "0921";
  const GITHUB_TOKEN = "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";
  const GITHUB_USER = "parkalldo@gmail.com";
  const REPO_NAME = "edu-archive";

  function checkPassword() {
    if (document.getElementById("pw").value === PASSWORD) {
      document.getElementById("login-section").style.display = "none";
      document.getElementById("main-section").style.display = "block";
      loadFiles();
    } else {
      document.getElementById("error").style.display = "block";
    }
  }

  document.getElementById("pw").addEventListener("keypress", e => {
    if (e.key === "Enter") checkPassword();
  });

  function showFileName() {
    const file = document.getElementById("file-input").files[0];
    document.getElementById("selected-file").textContent =
      file ? file.name : "선택된 파일 없음";
  }

  async function uploadFile() {
    const file = document.getElementById("file-input").files[0];
    const status = document.getElementById("upload-status");
    if (!file) { status.textContent = "⚠️ 파일을 먼저 선택해주세요."; return; }

    status.style.color = "#93c5fd";
    status.textContent = "업로드 중...";
    const reader = new FileReader();
    reader.onload = async function(e) {
      const base64 = e.target.result.split(",")[1];
      const url = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/materials/${file.name}`;
      const res = await fetch(url, {
        method: "PUT",
        headers: {
          "Authorization": `token ${GITHUB_TOKEN}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: `Upload ${file.name}`, content: base64 })
      });

      if (res.ok) {
        status.style.color = "#4ade80";
        status.textContent = "✅ 업로드 완료!";
        loadFiles();
      } else {
        status.style.color = "#f87171";
        status.textContent = "❌ 업로드 실패. 토큰과 저장소 이름을 확인해줘.";
      }
    };
    reader.readAsDataURL(file);
  }

  async function loadFiles() {
    const url = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/materials`;
    const res = await fetch(url, {
      headers: { "Authorization": `token ${GITHUB_TOKEN}` }
    });
    const list = document.getElementById("file-list");

    if (!res.ok) {
      list.innerHTML = "<p class='empty-state'>아직 업로드된 파일이 없어요 📂</p>";
      return;
    }

    const files = await res.json();
    if (files.length === 0) {
      list.innerHTML = "<p class='empty-state'>아직 업로드된 파일이 없어요 📂</p>";
      return;
    }

    list.innerHTML = "";
    files.forEach(file => {
      const icon = file.name.endsWith(".pdf") ? "📄" : "📊";
      list.innerHTML += `
        <div class="file-item">
          <div class="file-info">
            <div class="file-icon">${icon}</div>
            <span class="file-name">${file.name}</span>
          </div>
          <a class="download-btn" href="${file.download_url}" download>Download</a>
        </div>`;
    });
  }
</script>
</body>
</html>
