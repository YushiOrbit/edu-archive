<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>강의자료실</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Malgun Gothic', sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }
    .bg-deco {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .float-deco {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      animation: floatUp 7s ease-in-out infinite;
      opacity: 0.55;
    }
    .float-deco:nth-child(1)  { left: 4%;  top: 10%; animation-delay: 0s;   }
    .float-deco:nth-child(2)  { left: 90%; top: 8%;  animation-delay: 1.2s; }
    .float-deco:nth-child(3)  { left: 8%;  top: 42%; animation-delay: 2.4s; }
    .float-deco:nth-child(4)  { left: 88%; top: 38%; animation-delay: 0.8s; }
    .float-deco:nth-child(5)  { left: 3%;  top: 72%; animation-delay: 3s;   }
    .float-deco:nth-child(6)  { left: 92%; top: 68%; animation-delay: 1.8s; }
    .float-deco:nth-child(7)  { left: 48%; top: 5%;  animation-delay: 4s;   opacity: 0.25; }
    .float-deco:nth-child(8)  { left: 55%; top: 88%; animation-delay: 2s;   opacity: 0.25; }
    @keyframes floatUp {
      0%, 100% { transform: translateY(0px) rotate(-5deg); }
      50%       { transform: translateY(-14px) rotate(5deg); }
    }
    .wishu-deco {
      position: fixed;
      bottom: 72px; right: 20px;
      width: 200px; opacity: 0.9;
      z-index: 10;
      animation: floatUp 5s ease-in-out infinite;
      pointer-events: none;
    }
    #login-section {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      flex: 1; padding: 20px;
      position: relative; z-index: 1;
    }
    .login-box {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 52px 44px 44px;
      text-align: center;
      width: 100%; max-width: 400px;
      box-shadow: 0 0 0 1.5px #c8f0d8, 0 12px 48px rgba(100,200,140,0.13);
      position: relative; overflow: hidden;
    }
    .login-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 5px;
      background: linear-gradient(90deg, #a8e6cf, #ffd3e8, #b8e0ff, #a8e6cf);
      background-size: 200% 100%;
      animation: gradientShift 4s ease infinite;
    }
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .login-emoji { font-size: 42px; margin-bottom: 10px; display: block; animation: floatUp 3s ease-in-out infinite; }
    .login-box h2 { font-size: 20px; color: #2d6a4f; font-weight: 800; margin-bottom: 4px; }
    .login-box .login-sub { font-size: 11.5px; color: #a8c8b8; margin-bottom: 28px; letter-spacing: 0.5px; }
    .input-wrap { position: relative; margin-bottom: 14px; }
    .input-wrap span { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; }
    .login-box input {
      width: 100%; padding: 13px 16px 13px 38px;
      background: #f4fdf7; border: 1.5px solid #c8f0d8;
      border-radius: 14px; color: #2d6a4f; font-size: 14px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .login-box input:focus { border-color: #74c69d; box-shadow: 0 0 0 3px rgba(116,198,157,0.15); }
    .login-box input::placeholder { color: #c0ddd0; }
    .login-box button {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #74c69d, #a8e6cf);
      color: white; border: none; border-radius: 14px;
      font-size: 14px; font-weight: 800; cursor: pointer;
      transition: transform 0.15s, opacity 0.2s;
      box-shadow: 0 4px 14px rgba(116,198,157,0.35);
    }
    .login-box button:hover { transform: translateY(-1px); opacity: 0.92; }
    #error { color: #e07070; font-size: 12px; margin-top: 10px; display: none; }
    .login-dots { display: flex; justify-content: center; gap: 6px; margin-top: 20px; }
    .login-dots span { width: 6px; height: 6px; border-radius: 50%; }
    #main-section {
      display: none; flex: 1;
      max-width: 860px; width: 100%;
      margin: 0 auto; padding: 40px 20px 20px;
      position: relative; z-index: 1;
    }
    .page-header { margin-bottom: 28px; padding-bottom: 18px; border-bottom: 1.5px solid #e8f8ee; }
    .page-header h1 { font-size: 22px; color: #2d6a4f; font-weight: 800; }
    .page-header p { font-size: 12px; color: #a8c8b8; margin-top: 4px; }
    .upload-box {
      background: #fafffc; border: 2px dashed #b7e4c7;
      border-radius: 18px; padding: 30px; text-align: center;
      margin-bottom: 28px; transition: border-color 0.2s, background 0.2s;
    }
    .upload-box:hover { border-color: #74c69d; background: #f0fbf5; }
    .upload-box input[type="file"] { display: none; }
    .upload-box label {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 22px; background: #e8f8ee; color: #2d6a4f;
      border-radius: 12px; cursor: pointer; font-size: 13px;
      font-weight: 700; margin-bottom: 12px; transition: background 0.2s;
    }
    .upload-box label:hover { background: #c8f0d8; }
    #selected-file { font-size: 12px; color: #a8c8b8; margin-bottom: 10px; }
    .upload-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 28px;
      background: linear-gradient(135deg, #74c69d, #a8e6cf);
      color: white; border: none; border-radius: 12px;
      font-size: 13px; font-weight: 800; cursor: pointer;
      transition: transform 0.15s, opacity 0.2s;
      box-shadow: 0 4px 12px rgba(116,198,157,0.3);
    }
    .upload-btn:hover { transform: translateY(-1px); opacity: 0.9; }
    #upload-status { margin-top: 10px; font-size: 13px; }
    .section-title { font-size: 11px; font-weight: 800; color: #a8c8b8; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
    .file-item {
      background: #ffffff; border: 1.5px solid #e8f8ee;
      border-radius: 16px; padding: 14px 20px; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 2px 8px rgba(116,198,157,0.06);
    }
    .file-item:hover { border-color: #a8e6cf; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(116,198,157,0.12); }
    .file-info { display: flex; align-items: center; gap: 12px; }
    .file-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .file-icon.pdf { background: #ffe8ee; }
    .file-icon.ppt { background: #fff0e0; }
    .file-name { font-size: 13px; color: #2d6a4f; font-weight: 600; }
    .download-btn {
      background: #e8f8ee; color: #2d6a4f;
      padding: 7px 16px; border-radius: 10px;
      text-decoration: none; font-size: 12px; font-weight: 700;
      white-space: nowrap; transition: background 0.2s, transform 0.15s;
      display: flex; align-items: center; gap: 4px; cursor: pointer; border: none;
    }
    .download-btn:hover { background: #c8f0d8; transform: translateY(-1px); }
    .empty-state { text-align: center; color: #a8c8b8; padding: 48px; font-size: 14px; }
    footer {
      text-align: center; padding: 24px 20px 48px;
      border-top: 1.5px solid #e8f8ee; margin-top: 40px;
      position: relative; z-index: 1;
    }
    footer p { font-size: 11.5px; color: #c0ddd0; line-height: 1.9; }
    footer span { color: #74c69d; font-weight: 700; }
  </style>
</head>
<body>

<img class="wishu-deco" src="withu_2D.png" alt="wishu" />

<div id="login-section">
  <div class="login-box">
    <span class="login-emoji">🌿</span>
    <h2>강의자료실</h2>
    <p class="login-sub">✦ Lecture Library ✦</p>
    <div class="input-wrap">
      <span>🔑</span>
      <input type="password" id="pw" placeholder="Password" />
    </div>
    <div class="input-wrap">
      <span>🔒</span>
      <input type="password" id="token-input" placeholder="GitHub Token" />
    </div>
    <button onclick="checkPassword()">Enter ✦</button>
    <p id="error">비밀번호 또는 토큰이 틀렸습니다 💦</p>
    <div class="login-dots">
      <span style="background:#a8e6cf;"></span>
      <span style="background:#ffd3e8;"></span>
      <span style="background:#b8e0ff;"></span>
      <span style="background:#a8e6cf;"></span>
    </div>
  </div>
</div>

<div id="main-section">
  <div class="page-header">
    <h1>⭐ 강의자료실</h1>
    <p>PDF 및 PPTX 자료를 업로드하고 관리하세요</p>
  </div>
  <div class="upload-box">
    <input type="file" id="file-input" accept=".pdf,.pptx,.ppt,.zip,.png,.jpg" onchange="showFileName()" />
    <label for="file-input">📁 파일 선택</label>
    <p id="selected-file">선택된 파일 없음</p>
    <button class="upload-btn" onclick="uploadFile()">⬆ 업로드</button>
    <p id="upload-status"></p>
  </div>
  <div class="section-title">✦ 업로드된 자료</div>
  <div id="file-list">
    <p class="empty-state">아직 업로드된 파일이 없어요 🌿</p>
  </div>
</div>

<footer>
  <p>Created by <span>Seoyi · YushiOrbit</span></p>
  <p>for <span>Hanjasan Holdings</span></p>
</footer>

<script>
  const PASSWORD = "0221";
  const GITHUB_USER = "YushiOrbit";
  const REPO_NAME = "edu-archive";
  let TOKEN = "";

  function checkPassword() {
    const pw = document.getElementById("pw").value;
    const token = document.getElementById("token-input").value;
    if (pw === PASSWORD && token) {
      TOKEN = token;
      document.getElementById("login-section").style.display = "none";
      document.getElementById("main-section").style.display = "block";
      loadFiles();
    } else {
      document.getElementById("error").style.display = "block";
    }
  }

  document.getElementById("pw").addEventListener("keypress", e => {
    if (e.key === "Enter") checkPassword();
  });

  function showFileName() {
    const file = document.getElementById("file-input").files[0];
    document.getElementById("selected-file").textContent =
      file ? file.name : "선택된 파일 없음";
  }

  async function uploadFile() {
    const file = document.getElementById("file-input").files[0];
    const status = document.getElementById("upload-status");
    if (!file) { status.textContent = "⚠️ 파일을 먼저 선택해주세요."; return; }

    status.style.color = "#74c69d";
    status.textContent = "업로드 중... ✨";

    const reader = new FileReader();
    reader.onload = async function(e) {
      const base64 = e.target.result.split(",")[1];
      const url = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/materials/${file.name}`;

      // 기존 파일 sha 확인
      let sha = null;
      const check = await fetch(url, {
        headers: { "Authorization": `token ${TOKEN}` }
      });
      if (check.ok) {
        const existing = await check.json();
        sha = existing.sha;
      }

      const body = { message: `Upload ${file.name}`, content: base64 };
      if (sha) body.sha = sha;

      const res = await fetch(url, {
        method: "PUT",
        headers: {
          "Authorization": `token ${TOKEN}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });

      if (res.ok) {
        status.style.color = "#52b788";
        status.textContent = "✅ 업로드 완료!";
        loadFiles();
      } else {
        const err = await res.json();
        status.style.color = "#e07070";
        status.textContent = `❌ 실패: ${err.message}`;
      }
    };
    reader.readAsDataURL(file);
  }

  async function loadFiles() {
    const url = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/materials`;
    const res = await fetch(url, {
      headers: { "Authorization": `token ${TOKEN}` }
    });
    const list = document.getElementById("file-list");

    if (!res.ok) {
      list.innerHTML = "<p class='empty-state'>아직 업로드된 파일이 없어요 🌿</p>";
      return;
    }

    const files = await res.json();
    const realFiles = files.filter(f => f.name !== ".gitkeep");

    if (realFiles.length === 0) {
      list.innerHTML = "<p class='empty-state'>아직 업로드된 파일이 없어요 🌿</p>";
      return;
    }

    list.innerHTML = "";
    realFiles.forEach(file => {
      const isPdf = file.name.endsWith(".pdf");
      const icon = isPdf ? "📄" : "📊";
      const iconClass = isPdf ? "pdf" : "ppt";
      list.innerHTML += `
         <div class="file-item">
    <div class="file-info">
      <div class="file-icon ${iconClass}">${icon}</div>
      <span class="file-name">${file.name}</span>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="download-btn" onclick="downloadFile('${file.name}', '${file.sha}')">↓ Download</button>
      <button class="download-btn" style="background:#ffe8ee; color:#e07070;" onclick="deleteFile('${file.name}', '${file.sha}')">🗑️ 삭제</button>
    </div>
  </div>`;
    });
  }

  async function downloadFile(fileName) {
  const url = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/materials/${encodeURIComponent(fileName)}`;
  const res = await fetch(url, {
    headers: { "Authorization": `token ${TOKEN}` }
  });
  const data = await res.json();
  const binary = atob(data.content.replace(/\n/g, ""));
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) {
    bytes[i] = binary.charCodeAt(i);
  }
  const blob = new Blob([bytes]);
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = fileName;
  link.click();
  URL.revokeObjectURL(link.href);
}

    async function deleteFile(fileName, sha) {
  if (!confirm(`"${fileName}" 을 삭제할까요?`)) return;
  const url = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/materials/${fileName}`;
  const res = await fetch(url, {
    method: "DELETE",
    headers: {
      "Authorization": `token ${TOKEN}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: `Delete ${fileName}`, sha: sha })
  });
  if (res.ok) {
    alert("✅ 삭제 완료!");
    setTimeout(() => loadFiles(), 1000);
  } else {
    alert("❌ 삭제 실패!");
  }
}
</script>
